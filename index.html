<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Emergency View</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f6f7fb; color: #111; }
      .wrap { max-width: 720px; margin: 0 auto; padding: 20px; }
      .card { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 6px 24px rgba(0,0,0,.08); margin-bottom: 16px; }
      .muted { color: #666; }
      .row { display: flex; justify-content: space-between; gap: 12px; border-top: 1px solid #eee; padding: 10px 0; }
      .row:first-child { border-top: 0; }
      .label { font-weight: 700; }
      .pill { display: inline-block; padding: 6px 10px; border-radius: 999px; background: #eef2ff; }
      .error { background: #fff1f2; color: #991b1b; padding: 12px; border-radius: 12px; }
      .btn { display: inline-block; padding: 12px 14px; border-radius: 12px; text-decoration: none; background: #111; color: white; }
      .btn.secondary { background: #e5e7eb; color: #111; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Emergency View</h1>
        <div id="status" class="muted">Loading…</div>
      </div>

      <div id="content"></div>
    </div>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

      // Rsupabase values
      const SUPABASE_URL = "https://abrmnhlxwkddvgfperjm.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFicm1uaGx4d2tkZHZnZnBlcmptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjIzMTgsImV4cCI6MjA5MTg5ODMxOH0.21nGi-hW7vr4kCp0yVL_TgpBRZS5fwMOdrV2Z9sf1MQ";

      const supabase = createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY,
  );

  const statusEl = document.getElementById("status");
  const contentEl = document.getElementById("content");

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function getPayload() {
    const url = new URL(window.location.href);
    return url.searchParams.get("payload") || "";
  }

  function getToken() {
    const url = new URL(window.location.href);
    return url.searchParams.get("token") || "";
  }

  function decodePayload(payload) {
    try {
      const decoded = decodeURIComponent(payload);

      // First try plain JSON
      try {
        return JSON.parse(decoded);
      } catch (_) {}

      // Then try base64 JSON
      try {
        const json = atob(decoded);
        return JSON.parse(json);
      } catch (_) {}

      return null;
    } catch (_) {
      return null;
    }
  }

  function listSection(title, items) {
    if (!Array.isArray(items) || items.length === 0) {
      return "";
    }

    return `
      <div class="card">
        <h2>${escapeHtml(title)}</h2>

        ${items.map(item => `
          <div class="row">
            <div>
              ${escapeHtml(
                item.allergen_name ||
                item.medication_name ||
                item.condition_name ||
                "Item"
              )}
            </div>

            <div class="muted">
              ${escapeHtml(
                item.severity ||
                item.dosage ||
                item.type ||
                item.frequency ||
                ""
              )}
            </div>
          </div>
        `).join("")}
      </div>
    `;
  }

  function renderPatient(data, live) {
    statusEl.innerHTML = `
      <div class="pill">
        ${live ? "Live emergency data" : "Offline emergency snapshot"}
      </div>
    `;

    contentEl.innerHTML = `
      <div class="card">
        <h2>
          ${escapeHtml(data.first_name || "")}
          ${escapeHtml(data.family_name || "")}
        </h2>

        <div class="row">
          <div class="label">Date of birth</div>
          <div>${escapeHtml(data.date_of_birth || "")}</div>
        </div>

        <div class="row">
          <div class="label">Age</div>
          <div>${escapeHtml(data.age_years ?? "")}</div>
        </div>

        <div class="row">
          <div class="label">Blood type</div>
          <div>${escapeHtml(data.blood_type || "")}</div>
        </div>

        <div class="row">
          <div class="label">Phone</div>
          <div>${escapeHtml(data.phone || "")}</div>
        </div>

        <div class="row">
          <div class="label">Emergency contact</div>
          <div>
            ${escapeHtml(data.emergency_contact_name || "")}
            ${escapeHtml(data.emergency_contact_phone || "")}
          </div>
        </div>

        <div class="row">
          <div class="label">Insurance</div>
          <div>${escapeHtml(data.insurance_plan || "")}</div>
        </div>

        <div class="row">
          <div class="label">COVID vaccine</div>
          <div>${escapeHtml(data.covid_vaccine_type || "")}</div>
        </div>

        <div class="row">
          <div class="label">Address</div>
          <div>
            ${escapeHtml(
              [
                data.address_country,
                data.address_governorate,
                data.address_city,
              ]
                .filter(Boolean)
                .join(" / ")
            )}
          </div>
        </div>
      </div>

      ${listSection("Allergies", data.allergies)}
      ${listSection("Medications", data.medications)}
      ${listSection("Chronic conditions", data.chronic_conditions)}
    `;
  }

  async function load() {
    const payload = getPayload();
    let token = getToken();

    let decodedPayload = null;

    // PAYLOAD PATH
    if (payload) {
      decodedPayload = decodePayload(payload);

      if (decodedPayload?.offline_summary) {
        renderPatient(
          decodedPayload.offline_summary,
          false,
        );
      }

      // Extract token from payload
      if (
        decodedPayload?.token &&
        typeof decodedPayload.token === "string"
      ) {
        token = decodedPayload.token.trim();
      }
    }

    // NO TOKEN AVAILABLE
    if (!token) {
      if (!decodedPayload?.offline_summary) {
        statusEl.innerHTML = `
          <div class="error">
            Missing emergency token.
          </div>
        `;
      }

      return;
    }

    // LIVE LOOKUP
    try {
      const { data, error } = await supabase.rpc(
        "resolve_public_emergency_token",
        {
          _token: token,
        },
      );

      if (error) {
        throw error;
      }

      const row = Array.isArray(data)
        ? data[0]
        : data;

      if (row && typeof row === "object") {
        renderPatient(row, true);
      }
    } catch (e) {
      console.error(e);

      // Keep offline snapshot visible if available.
      if (!decodedPayload?.offline_summary) {
        statusEl.innerHTML = `
          <div class="error">
            Unable to load emergency data.
          </div>
        `;
      }
    }
  }

  load();
</script>
